<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ScanNasYork — High-performance quantamental stock screener for NYSE & NASDAQ. Screen 6,000+ equities with technical and fundamental filters.">
  <title>ScanNasYork | Quantamental Stock Screener</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
</div>

<div class="app-container">

  <!-- ═══ NAVBAR ═══ -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-brand">
      <div class="logo-icon">SN</div>
      <div>
        <h1>ScanNasYork</h1>
        <div class="subtitle">Quantamental Screener</div>
      </div>
    </div>
    <div class="navbar-actions">
      <div class="search-bar" style="margin-right: var(--space-md);">
        <input type="text" id="filter-search" placeholder="Search Symbol or Name..." style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-surface); color: var(--text-main); font-size: 0.9rem; width: 250px;">
      </div>
      <div class="navbar-stat">
        <div class="label">Results</div>
        <div class="value" id="total-stocks">—</div>
      </div>
      <div class="navbar-stat">
        <div class="label">Query Time</div>
        <div class="value" id="exec-time">—</div>
      </div>
    </div>
  </nav>

  <!-- ═══ TECHNICAL FILTERS ═══ -->
  <section class="panel" id="panel-technical" aria-label="Technical filters">
    <div class="panel-header">
      <h2>Technical Filters</h2>
      <button class="panel-toggle" aria-label="Toggle panel">−</button>
    </div>
    <div class="panel-body">
      <div class="filter-grid">
        <div class="filter-group">
          <label for="filter-rsi-min">RSI Min</label>
          <input type="number" id="filter-rsi-min" placeholder="0" min="0" max="100" step="1">
        </div>
        <div class="filter-group">
          <label for="filter-rsi-max">RSI Max</label>
          <input type="number" id="filter-rsi-max" placeholder="100" min="0" max="100" step="1">
        </div>
        <div class="filter-group">
          <label>MACD Positive</label>
          <div class="toggle-wrapper">
            <div class="toggle-switch" id="toggle-macd" role="switch" aria-label="MACD positive filter" tabindex="0"></div>
            <span style="font-size:0.75rem;color:var(--text-muted)">Only Bullish</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══ FUNDAMENTAL FILTERS ═══ -->
  <section class="panel" id="panel-fundamental" aria-label="Fundamental filters" style="margin-top:var(--space-md)">
    <div class="panel-header">
      <h2>Fundamental Filters</h2>
      <button class="panel-toggle" aria-label="Toggle panel">−</button>
    </div>
    <div class="panel-body">
      <div class="filter-grid">
        <div class="filter-group">
          <label for="filter-eps-min">EPS Min (TTM)</label>
          <input type="number" id="filter-eps-min" placeholder="e.g. 1.00" step="0.01">
        </div>
        <div class="filter-group">
          <label for="filter-eps-max">EPS Max (TTM)</label>
          <input type="number" id="filter-eps-max" placeholder="e.g. 50.00" step="0.01">
        </div>
        <div class="filter-group">
          <label for="filter-rev-min">Revenue Min ($M)</label>
          <input type="number" id="filter-rev-min" placeholder="e.g. 1000" step="100">
        </div>
        <div class="filter-group">
          <label for="filter-rev-max">Revenue Max ($M)</label>
          <input type="number" id="filter-rev-max" placeholder="e.g. 500000" step="100">
        </div>
        <div class="filter-group">
          <label for="filter-pe-max">P/E Ratio Max</label>
          <input type="number" id="filter-pe-max" placeholder="e.g. 30" step="1">
        </div>
        <div class="filter-group">
          <label for="filter-growth-min">EPS YoY Growth Min (%)</label>
          <input type="number" id="filter-growth-min" placeholder="e.g. 10" step="1">
        </div>
        <div class="filter-group">
          <label for="filter-mcap-min">Market Cap Min</label>
          <input type="number" id="filter-mcap-min" placeholder="e.g. 1000000000" step="1000000">
        </div>
        <div class="filter-group">
          <label for="filter-mcap-max">Market Cap Max</label>
          <input type="number" id="filter-mcap-max" placeholder="e.g. 3000000000000" step="1000000">
        </div>
        <div class="filter-group">
          <label for="filter-sector">Sector</label>
          <select id="filter-sector">
            <option value="">All Sectors</option>
          </select>
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn btn-primary" id="btn-screen">🔍 Screen Stocks</button>
        <button class="btn btn-secondary" id="btn-reset">↻ Reset</button>
        <button class="btn btn-secondary" id="btn-export">📥 Export CSV</button>
      </div>
    </div>
  </section>

  <!-- ═══ RESULTS ═══ -->
  <div class="results-header" style="margin-top:var(--space-xl)">
    <div class="results-count">
      Showing <strong id="result-count">0</strong> results
      <span class="exec-time">in <span id="exec-time-inline">—</span></span>
    </div>
  </div>

  <div class="table-container">
    <table class="data-table" role="grid" aria-label="Stock screening results">
      <thead>
        <tr>
          <th data-sort="symbol" class="sorted">Symbol <span class="sort-icon">▲</span></th>
          <th data-sort="company_name">Company <span class="sort-icon">▲</span></th>
          <th>Sector</th>
          <th data-sort="current_price" style="text-align:right">Price <span class="sort-icon">▲</span></th>
          <th style="text-align:right">Chg%</th>
          <th data-sort="rsi_14" style="text-align:right">RSI <span class="sort-icon">▲</span></th>
          <th data-sort="macd" style="text-align:right">MACD <span class="sort-icon">▲</span></th>
          <th data-sort="ttm_eps" style="text-align:right">EPS <span class="sort-icon">▲</span></th>
          <th data-sort="ttm_revenue" style="text-align:right">Revenue <span class="sort-icon">▲</span></th>
          <th data-sort="pe_ratio" style="text-align:right">P/E <span class="sort-icon">▲</span></th>
          <th data-sort="market_cap" style="text-align:right">Market Cap <span class="sort-icon">▲</span></th>
          <th data-sort="latest_eps_yoy_growth" style="text-align:right">YoY% <span class="sort-icon">▲</span></th>
          <th style="text-align:right">Volume</th>
        </tr>
      </thead>
      <tbody id="results-body">
        <tr><td colspan="12">
          <div class="table-loading">
            <div class="spinner-sm"></div>
            <span>Loading stocks...</span>
          </div>
        </td></tr>
      </tbody>
    </table>
  </div>

  <div id="pagination" class="pagination"></div>

</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>

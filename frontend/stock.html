<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Stock detail view — technical and fundamental analysis">
  <title>Stock Detail | ScanNasYork</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
</head>
<body>

<div id="loading-overlay" class="loading-overlay"><div class="spinner"></div></div>

<div class="app-container">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="logo-icon">SN</div>
      <div>
        <h1>ScanNasYork</h1>
        <div class="subtitle">Stock Detail</div>
      </div>
    </div>
  </nav>

  <a href="/" class="back-link">← Back to Screener</a>

  <!-- STOCK HEADER -->
  <div class="stock-header" id="stock-header">
    <div>
      <div class="symbol-badge" id="detail-symbol">—</div>
      <div class="company-name" id="detail-name">Loading...</div>
      <span class="cell-sector" id="detail-sector" style="margin-top:8px;display:inline-block">—</span>
    </div>
    <div class="price-display">
      <div class="price-value" id="detail-price">—</div>
      <div class="price-change" id="detail-change">—</div>
    </div>
  </div>

  <!-- METRIC CARDS -->
  <div class="metrics-grid" id="metrics-grid"></div>

  <!-- PRICE CHART -->
  <div class="chart-panel">
    <h2 style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:var(--space-md)">30-Day Price & Indicators</h2>
    <canvas id="price-chart"></canvas>
  </div>

  <!-- FINANCIAL PERFORMANCE CHART (Spec Version) -->
  <section class="panel mb-4" id="financial-performance-panel">
    <div class="panel-header d-flex-between">
      <h2>Financial Performance</h2>
      <div class="chart-controls">
        <div class="toggle-group">
          <button id="fp-btn-revenue" class="active" onclick="switchFinMetric('revenue')">Revenue</button>
          <button id="fp-btn-eps" onclick="switchFinMetric('eps')">EPS</button>
        </div>
        <div class="toggle-group">
          <button id="fp-btn-quarterly" class="active" onclick="switchFinPeriod('quarterly')">Quarterly</button>
          <button id="fp-btn-annual" onclick="switchFinPeriod('annual')">Annual</button>
        </div>
      </div>
    </div>
    <div class="panel-body">
      <div style="height: 350px; position: relative;">
        <canvas id="fin-perf-chart"></canvas>
      </div>
    </div>
  </section>

  <!-- ANNUAL & QUARTERLY EARNINGS -->
  <section class="panel" id="earnings-panel">
    <div class="panel-header">
      <h2>Revenue & Earnings History</h2>
    </div>
    <div class="panel-body">
      <div class="table-container">
        <table class="data-table earnings-table" id="earnings-table">
          <thead>
            <tr>
              <th style="text-align:left;width:160px">Period</th>
              <th style="text-align:right">Revenue</th>
              <th style="text-align:right">EPS</th>
              <th style="text-align:right">Net Income</th>
              <th style="text-align:right;width:120px">Report Date</th>
            </tr>
          </thead>
          <tbody id="earnings-body">
            <tr><td colspan="5" class="text-center" style="padding:24px;color:var(--text-muted)">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

</div>

<div id="toast-container" class="toast-container"></div>

<style>
  /* Earnings table alignment fixes */
  .earnings-table th,
  .earnings-table td {
    font-variant-numeric: tabular-nums;
  }
  .earnings-table .row-annual {
    background: rgba(99, 102, 241, 0.08);
    border-top: 2px solid var(--border-default);
  }
  .earnings-table .row-annual td {
    font-weight: 700;
    padding-top: var(--space-md);
    padding-bottom: var(--space-md);
  }
  .earnings-table .row-annual .cell-period {
    font-size: 0.9rem;
    color: var(--text-accent);
  }
  .earnings-table .row-quarter td {
    padding-left: var(--space-lg);
    color: var(--text-secondary);
  }
  .earnings-table .row-quarter .cell-period {
    font-size: 0.78rem;
    color: var(--text-muted);
    padding-left: 28px;
  }
  .earnings-table .cell-number {
    text-align: right;
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    min-width: 100px;
  }
  /* Financial Chart Styles */
  .d-flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .chart-controls { display: flex; gap: 12px; }
  .toggle-group {
    display: flex;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    padding: 3px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  .toggle-group button {
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    z-index: 10;
  }
  .toggle-group button:hover {
    color: white;
    background: rgba(255, 255, 255, 0.1);
  }
  .toggle-group button.active {
    background: var(--primary-default);
    color: white;
    box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
  }
</style>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script>
(function() {
  'use strict';

  const params = new URLSearchParams(window.location.search);
  const symbol = params.get('symbol');
  if (!symbol) { window.location.href = '/'; return; }

  document.title = `${symbol.toUpperCase()} | ScanNasYork`;

  document.addEventListener('DOMContentLoaded', async () => {
    const overlay = document.getElementById('loading-overlay');
    overlay.classList.add('active');

    try {
      const [detailRes, historyRes, financialRes] = await Promise.all([
        getStockDetail(symbol),
        getStockHistory(symbol, 30),
        fetch(`/api/v1/stocks/${symbol}/financial-chart`).then(r => r.json())
      ]);

      if (detailRes.success) renderDetail(detailRes.data);
      if (historyRes.success) renderChart(historyRes.data);

      if (financialRes && financialRes.success) {
        window._annualData = financialRes.data.annual;
        window._quarterlyData = financialRes.data.quarterly;
        renderFinancialChart();
      }
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      overlay.classList.remove('active');
    }
  });

  function renderDetail(data) {
    document.getElementById('detail-symbol').textContent = data.symbol;
    document.getElementById('detail-name').textContent = data.company_name || '';
    document.getElementById('detail-sector').textContent = data.sector || '—';

    const price = data.current_metrics?.price;
    document.getElementById('detail-price').textContent = formatPrice(price);

    // Metrics cards
    const m = data.current_metrics || {};
    const f = data.fundamentals || {};
    const cards = [
      { label: 'RSI (14)', value: m.rsi_14 != null ? parseFloat(m.rsi_14).toFixed(1) : '—' },
      { label: 'MACD', value: m.macd != null ? parseFloat(m.macd).toFixed(4) : '—' },
      { label: 'Volume', value: formatVolume(m.volume) },
      { label: 'TTM EPS', value: f.ttm_eps != null ? formatNumber(f.ttm_eps) : '—' },
      { label: 'TTM Revenue', value: formatLargeNumber(f.ttm_revenue) },
      { label: 'P/E Ratio', value: f.pe_ratio != null ? formatNumber(f.pe_ratio) : '—' },
      { label: 'EPS YoY Growth', value: formatPct(f.latest_eps_yoy_growth) },
      { label: 'Market Cap', value: formatLargeNumber(data.market_cap) },
      { label: 'ATR (14)', value: m.atr_14 != null ? formatNumber(m.atr_14) : '—' },
    ];

    document.getElementById('metrics-grid').innerHTML = cards.map(c => `
      <div class="metric-card">
        <div class="metric-label">${c.label}</div>
        <div class="metric-value">${c.value}</div>
      </div>
    `).join('');

    // Earnings table — Annual rows with quarterly breakdowns
    renderEarningsTable(data.annual_history || [], data.quarterly_history || []);
  }

  function renderEarningsTable(annualData, quarterlyData) {
    const tbody = document.getElementById('earnings-body');

    if (annualData.length === 0 && quarterlyData.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center" style="padding:24px;color:var(--text-muted)">No earnings data available</td></tr>';
      return;
    }

    // 1. Group data by year
    const annualByYear = {};
    for (const a of annualData) annualByYear[a.fiscal_year] = a;

    const quartersByYear = {};
    for (const q of quarterlyData) {
      const yr = q.fiscal_year;
      if (!quartersByYear[yr]) quartersByYear[yr] = [];
      quartersByYear[yr].push(q);
    }

    // 2. Get unique years from both sources and sort descending
    const allYears = Array.from(new Set([
      ...Object.keys(annualByYear).map(Number),
      ...Object.keys(quartersByYear).map(Number)
    ])).sort((a, b) => b - a);

    // 3. Generate HTML
    let html = '';
    for (const yr of allYears) {
      const annual = annualByYear[yr];
      const quarters = quartersByYear[yr] || [];

      // Annual summary row (if exists for this year)
      if (annual) {
        html += `
          <tr class="row-annual">
            <td class="cell-period">📅 FY ${yr}</td>
            <td class="cell-number">${formatLargeNumber(annual.revenue)}</td>
            <td class="cell-number">${annual.eps != null ? formatNumber(annual.eps, 4) : '—'}</td>
            <td class="cell-number">${formatLargeNumber(annual.net_income)}</td>
            <td class="cell-number" style="font-size:0.75rem">${annual.report_date || '—'}</td>
          </tr>`;
      } else {
        // Placeholder row for years with only quarterly data
        html += `
          <tr class="row-annual">
            <td class="cell-period">📅 FY ${yr}</td>
            <td class="cell-number" style="color:var(--text-muted)">—</td>
            <td class="cell-number" style="color:var(--text-muted)">—</td>
            <td class="cell-number" style="color:var(--text-muted)">—</td>
            <td class="cell-number" style="color:var(--text-muted)">—</td>
          </tr>`;
      }

      // Quarterly rows for this year (Sorted descending by period)
      // Note: Backend already sorts them DESC, but we'll be safe
      quarters.sort((a, b) => b.fiscal_period.localeCompare(a.fiscal_period));
      for (const q of quarters) {
        html += `
        <tr class="row-quarter">
          <td class="cell-period">${q.fiscal_period}</td>
          <td class="cell-number">${formatLargeNumber(q.revenue)}</td>
          <td class="cell-number">${q.eps != null ? formatNumber(q.eps, 4) : '—'}</td>
          <td class="cell-number">${formatLargeNumber(q.net_income)}</td>
          <td class="cell-number" style="font-size:0.75rem">${q.report_date || '—'}</td>
        </tr>`;
      }
    }

    tbody.innerHTML = html;
  }

  // Financial Performance Chart Logic (Spec Version)
  window._annualData = [];
  window._quarterlyData = [];
  window._fpMetric = 'revenue';
  window._fpPeriod = 'quarterly';
  window._fpChart = null;

  window.switchFinMetric = function(metric) {
    window._fpMetric = metric;
    document.getElementById('fp-btn-revenue').classList.toggle('active', metric === 'revenue');
    document.getElementById('fp-btn-eps').classList.toggle('active', metric === 'eps');
    renderFinancialChart();
  };

  window.switchFinPeriod = function(period) {
    window._fpPeriod = period;
    document.getElementById('fp-btn-quarterly').classList.toggle('active', period === 'quarterly');
    document.getElementById('fp-btn-annual').classList.toggle('active', period === 'annual');
    renderFinancialChart();
  };

  function renderFinancialChart() {
    const canvas = document.getElementById('fin-perf-chart');
    if (!canvas) {
      console.error('[ERROR] Canvas fin-perf-chart not found!');
      return;
    }
    const ctx = canvas.getContext('2d');
    const source = window._fpPeriod === 'annual' ? window._annualData : window._quarterlyData;
    
    console.log(`[DEBUG] Rendering Financial Chart: Metric=${window._fpMetric}, Period=${window._fpPeriod}, DataPoints=${source.length}`);

    if (!source || source.length === 0) {
      console.warn('[WARN] No data available to render chart.');
      return;
    }

    // Bug 2 Fix: ใช้ d.period เป็น label ตรงๆ ตามที่ API ส่งมา
    const labels = source.map(d => d.period);
    let dataValues = source.map(d => d[window._fpMetric]);

    // Format Revenue to Billion
    if (window._fpMetric === 'revenue') {
      dataValues = dataValues.map(v => v != null ? v / 1e9 : null);
    }

    const labelText = window._fpMetric === 'revenue' ? 'Revenue (Billion $)' : 'EPS ($)';
    const barColor = window._fpMetric === 'revenue' ? '#6366f1' : '#8b5cf6'; // Specified colors

    if (window._fpChart) {
      window._fpChart.destroy(); // Clear before re-render as requested
    }

    window._fpChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: labelText,
          data: dataValues,
          backgroundColor: barColor,
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#FFFFFF', font: { weight: 'bold' } } },
          tooltip: {
            backgroundColor: '#1a1f2e',
            borderColor: 'rgba(148,163,184,0.15)',
            borderWidth: 1,
            titleColor: '#f1f5f9',
            bodyColor: '#94a3b8',
            titleFont: { family: 'JetBrains Mono' },
            bodyFont: { family: 'JetBrains Mono' }
          }
        },
        scales: {
          x: { ticks: { color: '#FFFFFF' }, grid: { color: 'rgba(255,255,255,0.1)' } },
          y: { 
            ticks: { 
                color: '#FFFFFF',
                callback: (value) => window._fpMetric === 'revenue' ? `$${value.toFixed(2)}B` : `$${value.toFixed(2)}`
            }, 
            grid: { color: 'rgba(255,255,255,0.1)' } 
          }
        }
      }
    });
  }

  function renderChart(historyData) {
    if (!historyData || historyData.length === 0) return;

    const ctx = document.getElementById('price-chart').getContext('2d');
    const labels = historyData.map(d => d.date);
    const closes = historyData.map(d => parseFloat(d.close));
    const macdHist = historyData.map(d => d.macd_histogram ? parseFloat(d.macd_histogram) : null);

    new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Close',
            data: closes,
            borderColor: '#6366f1',
            backgroundColor: 'rgba(99,102,241,0.08)',
            borderWidth: 2,
            fill: true,
            tension: 0.3,
            pointRadius: 2,
            pointHoverRadius: 5,
          },
          {
            label: 'MACD Hist',
            data: macdHist,
            type: 'bar',
            backgroundColor: '#8b5cf6',
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#94a3b8', font: { family: 'Inter', size: 11 } } },
          tooltip: {
            backgroundColor: '#1a1f2e',
            borderColor: 'rgba(148,163,184,0.15)',
            borderWidth: 1,
            titleColor: '#f1f5f9',
            bodyColor: '#94a3b8',
            titleFont: { family: 'JetBrains Mono' },
            bodyFont: { family: 'JetBrains Mono' },
          },
        },
        scales: {
          x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(148,163,184,0.06)' } },
          y: { ticks: { color: '#64748b', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: 'rgba(148,163,184,0.06)' } },
        },
      },
    });
  }
})();
</script>
</body>
</html>
